<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bíblia Byte - Múltiplas Versões com Pesquisa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>📖 Bíblia Byte</h1>

    <div class="controles">
        <div class="linha-controle">
            <div class="grupo-campo">
                <label>📚 Versão:</label>
                <select id="versao" class="campo-medio">
                    <option value="acf">ACF (Almeida Corrigida Fiel)</option>
                    <option value="aa">AA (Almeida Revista)</option>
                    <option value="nvi">NVI (Nova Versão Internacional)</option>
                </select>
            </div>
        </div>

        <!-- Abas de navegação -->
        <div class="tab-container">
            <button class="tab ativo" onclick="mudarAba('leitura')">📖 Leitura</button>
            <button class="tab" onclick="mudarAba('pesquisa')">🔍 Pesquisa</button>
        </div>

        <!-- Painel de Leitura -->
        <div id="painel-leitura" class="painel ativo">
            <div class="linha-controle">
                <div class="grupo-campo">
                    <label>📚 Livro:</label>
                    <select id="livro" class="campo-medio"></select>
                </div>
            </div>
            
            <div class="linha-controle">
                <div class="grupo-campo">
                    <label>📖 Capítulo:</label>
                    <input type="number" id="capitulo" class="campo-pequeno" value="1" min="1" inputmode="numeric">
                </div>
                
                <div class="grupo-campo">
                    <label>🔢 Versículo:</label>
                    <input type="number" id="versiculo" class="campo-pequeno" value="" min="1" placeholder="Todos" inputmode="numeric">
                    <span style="font-size: 12px; color: #888;">(opcional)</span>
                </div>
                
                <button class="btn-ler" onclick="buscarCapitulo()">📖 Ler Capítulo</button>
            </div>
        </div>

        <!-- Painel de Pesquisa -->
        <div id="painel-pesquisa" class="painel">
            <div class="pesquisa-container">
                <input type="text" id="termoPesquisa" placeholder="Digite uma palavra ou frase..." inputmode="text">
                <select id="filtroLivroPesquisa" style="min-width: 150px;">
                    <option value="todos">Todos os livros</option>
                </select>
                <button onclick="executarPesquisa()">🔍 Pesquisar</button>
                <button onclick="limparPesquisa()" style="background: #95a5a6;">🗑️ Limpar</button>
            </div>
            <div id="resultadosPesquisa" class="resultados-pesquisa">
                <div class="info-pesquisa">Digite um termo e clique em Pesquisar</div>
            </div>
        </div>
    </div>

    <div id="resultado">
        <div class="loading">⏳ Selecione uma versão e clique em buscar...</div>
    </div>

   <script src="script.js"></script>
</body>
</html>
