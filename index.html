<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#2c3e50">
  
  <title>📖 Bíblia ARC - Modo Avançado</title>
  
  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <div class="header">
    <div class="header-top">
      <a href="index.html" class="back-btn">←</a>
      <h1>📖 Bíblia ARC Avançada</h1>
      <button class="back-btn" id="nightModeToggle">🌙</button>
    </div>
    <div class="reading-progress">
      <div class="progress-bar" id="readingProgress"></div>
    </div>
  </div>

  <div class="container">
    <!-- Navegador -->
    <div class="navigator">
      <div class="selector-row">
        <select id="bookSelect"></select>
        <select id="chapterSelect"></select>
      </div>
      <div class="nav-buttons">
        <button class="nav-btn" id="prevChapterBtn">← Anterior</button>
        <button class="nav-btn" id="nextChapterBtn">Próximo →</button>
      </div>
    </div>

    <!-- Conteúdo Bíblico -->
    <div class="bible-content" id="bibleContent">
      <div class="loading">
        <div class="spinner"></div>
        <p>Carregando a Palavra...</p>
      </div>
    </div>

    <!-- Estatísticas -->
    <div class="stats-panel" id="statsPanel">
      <div class="stats-grid">
        <div class="stat-item">
          <div class="stat-value" id="versesRead">0</div>
          <div class="stat-label">Versículos lidos</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="bookmarksCount">0</div>
          <div class="stat-label">Favoritos</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="readingStreak">0</div>
          <div class="stat-label">Dias seguidos</div>
        </div>
      </div>
    </div>
  </div>

  <!-- FABs -->
  <div class="fab-container">
    <button class="fab" id="scrollTopBtn">↑</button>
    <button class="fab fab-small" id="shareBtn">📤</button>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- JavaScript (módulos) -->
  <script src="js/config.js"></script>
  <script src="js/state.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/parser.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
  
  <!-- Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }
  </script>
</body>
</html>
